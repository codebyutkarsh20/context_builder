version: "3.9"

services:
  neo4j:
    image: neo4j:5.23-community
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/contextbuilder
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "contextbuilder", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-contextbuilder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      SUMMARIZER_MODEL: ${SUMMARIZER_MODEL:-claude-haiku-4-5-20251001}
      DATA_DIR: /data
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ANONYMIZED_TELEMETRY: "False"
      CHROMA_TELEMETRY: "false"
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_TOKEN: ${GH_TOKEN}
    volumes:
      - ./backend:/app
      - repo_mounts:/repos
      - context_data:/data
      - chroma_cache:/root/.cache/chroma
      - /Users/utkarshpatidar:/Users/utkarshpatidar:rw
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Add --reload for dev so code changes on the volume mount are picked up automatically
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0

volumes:
  neo4j_data:
  repo_mounts:
  context_data:
  chroma_cache:
